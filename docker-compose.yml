version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: globus_db
    environment:
      POSTGRES_USER: globus_user
      POSTGRES_PASSWORD: globus_password
      POSTGRES_DB: globus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # MinIO (Alternative locale à Amazon S3 pour le dev de la GED)
  minio:
    image: minio/minio:latest
    container_name: globus_minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Interface Web MinIO Console
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
